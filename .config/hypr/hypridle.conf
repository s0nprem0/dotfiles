general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Keyboard backlight control (30s timeout) — auto-detects device
listener { 
    timeout = 30
    on-timeout = device=$(brightnessctl -l 2>/dev/null | grep kbd_backlight | head -1 | awk -F"'" '{print $2}') && [ -n "$device" ] && brightnessctl -sd "$device" set 0
    on-resume = device=$(brightnessctl -l 2>/dev/null | grep kbd_backlight | head -1 | awk -F"'" '{print $2}') && [ -n "$device" ] && brightnessctl -rd "$device"
}

# Dim screen after 4 minutes (unless media is playing)
listener {
    timeout = 240
    on-timeout = ~/.config/hypr/scripts/is-media-playing.sh || brightnessctl -s set 10
    on-resume = brightnessctl -r
}

# Lock screen after 5 minutes (unless media is playing)
listener {
    timeout = 300
    on-timeout = ~/.config/hypr/scripts/is-media-playing.sh || loginctl lock-session
}

# Turn off display after 6 minutes (unless media is playing)
listener {
    timeout = 360
    on-timeout = ~/.config/hypr/scripts/is-media-playing.sh || hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes (unless media is playing)
listener {
    timeout = 1800
    on-timeout = ~/.config/hypr/scripts/is-media-playing.sh || systemctl suspend
}
