$font = JetBrainsMono Nerd Font

source = ~/.config/hypr/colors-hyprlock.conf

general {
  disable_loading_bar = true
  hide_cursor = true
  grace = 2
  no_fade_in = false
}

background {
  monitor =
  path = screenshot
  blur_passes = 0
  blur_size = 0
  noise = 0
  contrast = 1.0
  brightness = 0.85
}

# INPUT FIELD - Blocky Style
input-field {
  monitor =
  size = 320, 55
  outline_thickness = 2
  dots_size = 0
  dots_spacing = 0
  dots_center = false
  outer_color = $input_outer
  inner_color = $input_inner
  font_color = $input_font
  fail_color = $fail_color
  check_color = $check_color
  fade_on_empty = true
  font_family = $font
  placeholder_text = <i><span foreground="#$placeholder_hex">🔒  Enter Pass</span></i>
  hide_input = true
  position = 0, -60
  halign = center
  valign = center
}

# CLOCK - Hours - Blocky Style
label {
  monitor =
  text = cmd[update:1000] echo "$(date +\"%I\")"
  color = $time_color
  font_size = 96
  font_family = $font Bold
  position = -160, 140
  halign = right
  valign = center
  render_type = text
}

# CLOCK - Minutes - Blocky Style
label {
  monitor =
  text = cmd[update:1000] echo "$(date +\"%M\")"
  color = $time_color
  font_size = 96
  font_family = $font Bold
  position = -80, 140
  halign = right
  valign = center
  render_type = text
}

# AM/PM - Blocky Style
label {
  monitor =
  text = cmd[update:1000] echo "$(date +\"%p\")"
  color = $muted_color
  font_size = 14
  font_family = $font
  position = -160, -75
  halign = right
  valign = center
  render_type = text
}

# DATE - Blocky Style
label {
  monitor =
  text = cmd[update:60000] echo "$(date +\"%A, %B %d, %Y\")"
  color = $muted_color
  font_size = 14
  font_family = $font
  position = -160, -110
  halign = right
  valign = center
  render_type = text
}

# RUNNING APPS - Blocky Style
label {
  monitor =
  text = cmd[update:5000] echo "Running $(hyprctl clients -j | jq length) applications"
  color = $dim_color
  font_size = 10
  font_family = $font
  position = -160, 80
  halign = right
  valign = bottom
  render_type = text
}
