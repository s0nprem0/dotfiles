$font = JetBrainsMono Nerd Font

source = ~/.config/hypr/colors-hyprlock.conf

general {
  disable_loading_bar = true
  hide_cursor = true
}

background {
    monitor =
    path = ~/Pictures/lain2.jpg
    blur_size = 8
    blur_passes = 3
}

label {
    monitor =
    text = $TIME
    text_align = center
    color = $time_color
    font_size = 40
    font_family = $font
    rotate = 0 
    position = 40, 100
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = $input_inner
    font_color = $input_font
    fade_on_empty = true
    font_family = $font
    placeholder_text = <i><span foreground="#$placeholder_hex">🔒  Enter Pass</span></i>
    hide_input = true
    position = 34, -380
    halign = center
    valign = center
}
