$font = JetBrainsMono Nerd Font

source = ~/.config/hypr/colors-hyprlock.conf

general {
  disable_loading_bar = true
  hide_cursor = true
  grace = 2
  no_fade_in = false
}

background {
  monitor =
  path = screenshot
  blur_passes = 4
  blur_size = 2
  noise = 0.02
  contrast = 1.0
  brightness = 0.85
}

# INPUT FIELD
input-field {
  monitor =
  size = 320, 55
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $input_outer
  inner_color = $input_inner
  font_color = $input_font
  fail_color = $fail_color
  check_color = $check_color
  fade_on_empty = true
  font_family = $font
  placeholder_text = <i><span foreground="#$placeholder_hex">🔒  Enter Pass</span></i>
  hide_input = true
  position = 0, -60
  halign = center
  valign = center
}

# CLOCK - Hours
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%I")"
  color = $time_color
  font_size = 96
  font_family = $font Bold
  position = 0, 140
  halign = center
  valign = center
}

# CLOCK - Minutes
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%M")"
  color = $time_color
  font_size = 96
  font_family = $font Bold
  position = 0, 0
  halign = center
  valign = center
}

# AM/PM
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%p")"
  color = $muted_color
  font_size = 14
  font_family = $font
  position = 0, -75
  halign = center
  valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:60000] echo "$(date +"%A, %B %d, %Y")"
  color = $muted_color
  font_size = 14
  font_family = $font
  position = 0, -110
  halign = center
  valign = center
}

# RUNNING APPS
label {
  monitor =
  text = cmd[update:5000] echo "Running $(hyprctl clients -j | jq length) applications"
  color = $dim_color
  font_size = 10
  font_family = $font
  position = 0, 80
  halign = center
  valign = bottom
}
