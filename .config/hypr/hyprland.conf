# в–Ҳв–‘в–Җв–‘в–ҲвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–ҲвҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–Ҳв–Җв–„
# See https://wiki.hyprland.org/Configuring/Monitors/
source=~/.config/hypr/monitors.conf

# My Programs
source=~/.config/hypr/defaultPrograms.conf
source=~/.config/hypr/colors.conf


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = waybar &
exec-once = hyprpaper & hypridle

# Env & polkit
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent


exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,ssh
exec-once = ~/.config/hypr/scripts/usb-monitor.sh
exec-once = ~/.config/hypr/scripts/idle-inhibit.sh


# Notification System
# exec-once = dunst &  # Primary notification daemon (for popups)
exec-once = sleep 1 && swaync


# в–Ҳв–Җв–ҖвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–‘в–Ҳ
# в–Ҳв–Ҳв–„вҖғв–Ҳв–‘в–Җв–ҲвҖғв–Җв–„в–Җ
# See https://wiki.hyprland.org/Configuring/Environment-variables/
source=~/.config/hypr/env.conf

###################
### PERMISSIONS ###
###################

