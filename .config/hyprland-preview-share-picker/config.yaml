stylesheets:
  - ./style.css
default_page: windows

window:
  height: 500
  width: 1000

image:
  resize_size: 200
  widget_size: 150

windows:
  min_per_row: 3
  max_per_row: 999
  clicks: 2
  spacing: 12

outputs:
  clicks: 2
  spacing: 6
  show_label: false
  respect_output_scaling: true

region:
  command: slurp -f '%o@%x,%y,%w,%h'

hide_token_restore: false
debug: false
